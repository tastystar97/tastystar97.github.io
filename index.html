    <!-- ==========================================
         최초 페이지 로딩 및 라우터 제어 스크립트
         (내부 htmx-pages 템플릿 영역 제거 및 외부 파일 통합 라우팅으로 변경)
         ========================================== -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const page = urlParams.get('page') || 'home';
            const mainContent = document.getElementById('main-content');
            
            // 현재 환경이 캔버스 미리보기(Blob URL)인지 확인
            const isPreviewEnv = window.location.protocol === 'blob:';
            
            // 1. 페이지 로딩 로직 (모든 페이지를 외부 파일에서 호출)
            if (isPreviewEnv) {
                // 미리보기 환경일 때 외부 파일 에러 방지용 안내 메시지 출력
                mainContent.innerHTML = `
                    <div class="flex flex-col items-center justify-center p-10 mt-10 text-center bg-white rounded-lg shadow-sm border border-gray-100 max-w-2xl mx-auto">
                        <h2 class="text-2xl font-bold text-red-500 mb-3">미리보기 제한 안내</h2>
                        <p class="text-gray-700 leading-relaxed">
                            현재 <strong>AI 미리보기 환경(임시 주소)</strong>에서는 보안 및 브라우저 정책상<br> 
                            분리된 <code class="text-blue-600 font-bold bg-blue-50 px-1 rounded">${page}.html</code> 파일을 동적으로 불러올 수 없습니다.
                        </p>
                        <div class="mt-6 text-sm text-gray-500 bg-gray-50 p-4 rounded-md">
                            👉 작성된 코드는 완전히 정상입니다!<br>
                            GitHub Pages 서버에 업로드하시거나 로컬 환경(Live Server 등)에서 확인하시면 완벽하게 작동합니다.
                        </div>
                    </div>`;
            } else {
                // 실제 서버 환경: URL 파라미터와 일치하는 html 파일 로드
                htmx.ajax('GET', page + '.html', {
                    target: '#main-content',
                    swap: 'innerHTML show:window:top'
                });
            }
            
            // 2. 모바일 메뉴 토글 로직
            const menuBtn = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');
            menuBtn.onclick = () => {
                if (mobileMenu.classList.contains('max-h-0')) {
                    mobileMenu.classList.remove('max-h-0');
                    mobileMenu.style.maxHeight = mobileMenu.scrollHeight + 'px';
                } else {
                    mobileMenu.style.maxHeight = '0';
                    setTimeout(() => mobileMenu.classList.add('max-h-0'), 300);
                }
            };
            
            mobileMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.style.maxHeight = '0';
                    setTimeout(() => mobileMenu.classList.add('max-h-0'), 300);
                });
            });

            // 3. 미리보기 환경에서 네비게이션 클릭 에러 방어 이벤트
            document.body.addEventListener('click', (e) => {
                const link = e.target.closest('a[hx-get]');
                if (link && isPreviewEnv) {
                    e.preventDefault();
                    e.stopPropagation();
                    alert("미리보기 창에서는 외부 파일 로드가 차단되어 있습니다. GitHub 배포 후 확인해주세요.");
                }
            }, true);
        });
    </script>
