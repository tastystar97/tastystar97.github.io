<div class="container mx-auto px-6 py-12 max-w-5xl">
    <div class="mb-8">
        <h2 class="text-3xl font-extrabold text-gray-800">관련기사</h2>
        <p class="text-gray-500 mt-2">은빛금빛 봉사단의 언론 보도 및 관련 기사를 모아두는 공간입니다.</p>
    </div>

    <div class="bg-white rounded-xl shadow-md overflow-hidden">
        <table class="min-w-full text-center">
            <thead class="bg-blue-50 border-b border-blue-100">
                <tr>
                    <th scope="col" class="px-6 py-4 text-sm font-bold text-gray-700">번호</th>
                    <th scope="col" class="px-6 py-4 text-sm font-bold text-gray-700 text-left w-2/3">제목</th>
                    <th scope="col" class="px-6 py-4 text-sm font-bold text-gray-700">작성일</th>
                </tr>
            </thead>
            <tbody id="article-board-list" class="divide-y divide-gray-100">
                <tr>
                    <td colspan="3" class="px-6 py-8 text-gray-400">
                        기사 데이터를 불러오는 중입니다...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="flex justify-center mt-8">
        <nav class="flex items-center space-x-2">
            <button class="px-3 py-1 rounded-md text-gray-500 hover:bg-gray-100">&laquo;</button>
            <button class="px-3 py-1 rounded-md bg-blue-600 text-white font-medium">1</button>
            <button class="px-3 py-1 rounded-md text-gray-500 hover:bg-gray-100 hover:text-blue-600">2</button>
            <button class="px-3 py-1 rounded-md text-gray-500 hover:bg-gray-100">&raquo;</button>
        </nav>
    </div>
</div>

<script>
    // JSON 데이터를 동적으로 불러오는 자바스크립트
    (function() {
        const boardList = document.getElementById('article-board-list');

        // articles.json 파일에서 데이터 가져오기
        fetch('asset/articles.json')
            .then(response => {
                if (!response.ok) throw new Error('네트워크 응답이 올바르지 않습니다.');
                return response.json();
            })
            .then(data => {
                // 기존 로딩 텍스트 지우기
                boardList.innerHTML = '';

                // 데이터가 없을 경우
                if (data.length === 0) {
                    boardList.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-gray-500">등록된 기사가 없습니다.</td></tr>`;
                    return;
                }

            data.forEach(item => {
                const row = document.createElement('tr');
                row.className = "hover:bg-gray-50 transition-colors cursor-pointer group";
    
                row.onclick = () => {
             // 1. 외부 링크 (http로 시작) -> 새 탭에서 열기
                if (item.link.startsWith('http')) {
                window.open(item.link, '_blank', 'noopener,noreferrer');
                } 
            // 2. 내부 링크 (기존 SPA 방식 유지) -> HTMX로 부드럽게 전환
                else if (item.link !== '#') {
            // HTMX의 ajax 요청 기능을 자바스크립트에서 직접 호출
                htmx.ajax('GET', item.link, {target:'#main-content', swap:'innerHTML'});
            // 브라우저 주소창 업데이트 (뒤로가기 지원)
                history.pushState({}, '', item.link);
                }
                };

            row.innerHTML = `
                <td class="px-6 py-4 text-sm text-gray-500">${item.id}</td>
                <td class="px-6 py-4 text-sm text-gray-800 text-left font-medium truncate max-w-xs md:max-w-xl">
                  <span class="group-hover:text-blue-600">${item.title}</span>
            </td>
            <td class="px-6 py-4 text-sm text-gray-500">${item.date}</td>
            `;
            boardList.appendChild(row);
        });
            })
            .catch(error => {
                console.error('기사 로딩 실패:', error);
                boardList.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-red-500 text-sm">게시글을 불러오는데 실패했습니다. 로컬 웹 서버 환경인지 확인해주세요.</td></tr>`;
            });
    })();
</script>
